name: Daily Treasury Bond Report

on:
  schedule:
    # Run daily at 6:00 PM Sri Lanka Time (12:30 UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # Needed to commit reports back
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -e .
      
      - name: Run scraper (incremental)
        run: |
          python extract_data.py --incremental --output output/treasury_bond_yields.xlsx
        continue-on-error: true
      
      - name: Check output
        id: check_output
        run: |
          if [ -f "output/treasury_bond_yields.xlsx" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            ls -lh output/treasury_bond_yields.xlsx
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Upload artifact
        if: steps.check_output.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: treasury-report
          path: output/treasury_bond_yields.xlsx
          retention-days: 30
      
      - name: Commit report to repo
        if: steps.check_output.outputs.exists == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/
          git diff --staged --quiet || git commit -m "Update treasury bond yields - $(date +%Y-%m-%d)"
          git push
      
      - name: Send email
        if: steps.check_output.outputs.exists == 'true' && secrets.RESEND_API_KEY != ''
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          cat > send_email.py << 'EOF'
          import os
          import sys
          from datetime import datetime
          from pathlib import Path
          from extract_data import EmailSender

          api_key = os.environ.get("RESEND_API_KEY", "")
          to_email = os.environ.get("TO_EMAIL", "")
          from_email = os.environ.get("FROM_EMAIL", "onboarding@resend.dev")

          if not api_key or not to_email:
              print("Missing email configuration")
              sys.exit(0)

          sender = EmailSender(api_key, from_email, to_email)
          excel_path = Path("output/treasury_bond_yields.xlsx")
          
          stats = {
              "twoway_count": 0,
              "ddo_count": 0,
              "total_dates": 0,
              "issues": []
          }

          success = sender.send_report(excel_path, datetime.now(), stats)
          sys.exit(0 if success else 1)
          EOF
          python send_email.py