name: Daily Treasury Bond Report

on:
  schedule:
    # Run daily at 6:00 PM Sri Lanka Time (12:30 UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install xlrd openpyxl requests
      
      - name: Run the scraper
        run: |
          python extract_data.py --year 2025 --month 12
        env:
          REPORTS_DIR: treasury_reports
          OUTPUT_FILE: treasury_bond_yields.xlsx
        continue-on-error: true
      
      - name: List files
        run: |
          echo "=== Reports directory ==="
          ls -la treasury_reports/ || echo "No reports dir"
          echo ""
          echo "=== Current directory ==="
          ls -la
      
      - name: Check if Excel was created
        id: check_excel
        run: |
          if [ -f "treasury_bond_yields.xlsx" ]; then
            echo "excel_exists=true" >> $GITHUB_OUTPUT
            ls -la treasury_bond_yields.xlsx
          else
            echo "excel_exists=false" >> $GITHUB_OUTPUT
            echo "Excel file not found"
          fi
      
      - name: Upload Excel as artifact
        if: steps.check_excel.outputs.excel_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: treasury-report
          path: treasury_bond_yields.xlsx
          retention-days: 30
      
      - name: Send email with attachment
        if: steps.check_excel.outputs.excel_exists == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          if [ -n "$RESEND_API_KEY" ]; then
            python -c "
            import os
            import base64
            from datetime import datetime
            import requests
            
            latest_file = 'treasury_bond_yields.xlsx'
            if not os.path.exists(latest_file):
                print('No Excel file found')
                exit(0)
            
            print(f'Attaching: {latest_file}')
            
            with open(latest_file, 'rb') as f:
                file_data = f.read()
            
            file_b64 = base64.b64encode(file_data).decode()
            
            today = datetime.now().strftime('%Y-%m-%d')
            subject = f'Treasury Bond Yields - {today}'
            
            to_email = os.environ.get('TO_EMAIL', '')
            from_email = os.environ.get('FROM_EMAIL', 'onboarding@resend.dev')
            
            url = 'https://api.resend.com/emails'
            headers = {
                'Authorization': f'Bearer {os.environ.get(\"RESEND_API_KEY\")}',
                'Content-Type': 'application/json'
            }
            
            payload = {
                'from': from_email,
                'to': [to_email],
                'subject': subject,
                'html': f'<p>Please find attached the Treasury Bond Yields report for {today}.</p>',
                'attachments': [
                    {
                        'filename': latest_file,
                        'content': file_b64
                    }
                ]
            }
            
            print(f'Sending to: {to_email}')
            print(f'From: {from_email}')
            
            r = requests.post(url, headers=headers, json=payload)
            print(f'Response: {r.status_code}')
            print(f'Body: {r.text}')
            
            if r.status_code in [200, 201, 202]:
                print('Email sent successfully')
            else:
                print(f'Email failed: {r.status_code}')
          else
            echo "Resend not configured, skipping email"
          fi