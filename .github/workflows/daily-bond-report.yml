name: Daily Treasury Bond Report

on:
  schedule:
    # Run daily at 6:00 PM Sri Lanka Time (12:30 UTC)
    - cron: '30 12 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install xlrd openpyxl requests
      
      - name: Fetch today's report
        run: python extract_data.py --today
        env:
          REPORTS_DIR: treasury_reports
      
      - name: Check if new report was downloaded
        id: check_files
        run: |
          ls -la treasury_reports/
          if ls treasury_reports/report_$(date +%d-%m-%Y).xlsx 2>/dev/null; then
            echo "new_report=true" >> $GITHUB_OUTPUT
          else
            echo "new_report=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run full export if needed
        if: steps.check_files.outputs.new_report == 'true'
        run: |
          python extract_data.py --year $(date +%Y) --month $(date +%-m)
        env:
          REPORTS_DIR: treasury_reports
          OUTPUT_FILE: treasury_bond_yields_$(date +%Y%m%d).xlsx
      
      - name: Upload Excel as artifact
        if: steps.check_files.outputs.new_report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: treasury-report
          path: treasury_bond_yields_*.xlsx
          retention-days: 30
      
      - name: Send email with attachment
        if: steps.check_files.outputs.new_report == 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          if [ -n "$SENDGRID_API_KEY" ]; then
            python -c "
            import os
            import subprocess
            from email.mime.multipart import MIMEMultipart
            from email.mime.text import MIMEText
            from email.mime.base import MIMEBase
            from email import encoders
            
            # Find the latest Excel file
            import glob
            files = glob.glob('treasury_bond_yields_*.xlsx')
            if not files:
                print('No Excel file found')
                exit(0)
            
            latest_file = max(files, key=os.path.getmtime)
            print(f'Attaching: {latest_file}')
            
            # Send email via SendGrid
            import requests
            
            today = datetime.now().strftime('%Y-%m-%d')
            subject = f'Treasury Bond Yields - {today}'
            body = f'Please find attached the Treasury Bond Yields report for {today}.'
            
            # Read file
            with open(latest_file, 'rb') as f:
                file_data = f.read()
            
            # Using SendGrid API
            url = 'https://api.sendgrid.com/v3/mail/send'
            headers = {
                'Authorization': f'Bearer $SENDGRID_API_KEY',
                'Content-Type': 'application/json'
            }
            
            # Convert to base64
            import base64
            file_b64 = base64.b64encode(file_data).decode()
            
            payload = {
                'personalizations': [{
                    'to': [{'email': os.environ.get('TO_EMAIL', '')}]
                }],
                'from': {'email': 'reports@bond-scrapper.treasury'},
                'subject': subject,
                'attachments': [{
                    'content': file_b64,
                    'filename': latest_file,
                    'type': 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
                    'disposition': 'attachment'
                }],
                'content': [{
                    'type': 'text/plain',
                    'value': body
                }]
            }
            
            try:
                r = requests.post(url, headers=headers, json=payload)
                if r.status_code in [200, 202, 201]:
                    print('Email sent successfully')
                else:
                    print(f'Email failed: {r.status_code} - {r.text}')
            except Exception as e:
                print(f'Email error: {e}')
            "
          else
            echo "SendGrid not configured, skipping email"
          fi