name: Daily Treasury Bond Report

on:
  schedule:
    # Run daily at 8:00 AM Sri Lanka Time (02:30 UTC)
    - cron: '30 2 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  fetch-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install xlrd openpyxl requests
      
      - name: Run the scraper
        run: |
          python extract_data.py --year 2025 --month 12
        env:
          REPORTS_DIR: treasury_reports
          OUTPUT_FILE: treasury_bond_yields.xlsx
        continue-on-error: true
      
      - name: List files
        run: |
          echo "=== Reports directory ==="
          ls -la treasury_reports/ || echo "No reports dir"
          echo ""
          echo "=== Current directory ==="
          ls -la
      
      - name: Check if Excel was created
        id: check_excel
        run: |
          if [ -f "treasury_bond_yields.xlsx" ]; then
            echo "excel_exists=true" >> $GITHUB_OUTPUT
            ls -la treasury_bond_yields.xlsx
          else
            echo "excel_exists=false" >> $GITHUB_OUTPUT
            echo "Excel file not found"
          fi
      
      - name: Upload Excel as artifact
        if: steps.check_excel.outputs.excel_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: treasury-report
          path: treasury_bond_yields.xlsx
          retention-days: 30
      
      - name: Send email with attachment
        if: steps.check_excel.outputs.excel_exists == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: python send_email.py
